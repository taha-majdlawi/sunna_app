name: sunaa_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+3

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  font_awesome_flutter: ^10.12.0
  path_provider: ^2.1.5
  pdf: ^3.8.4
  share_plus: ^12.0.1
  url_launcher: ^6.3.2
  youtube_player_flutter: ^9.1.3

dev_dependencies:
  flutter_launcher_icons: ^0.10.0
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true

  assets:
    - assets/transcripts/
    - assets/transcripts_list.json
    - assets/fonts/NotoSansArabic-Regular.ttf  # الخط العربي

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"