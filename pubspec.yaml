name: sunaa_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+2

environment:
  sdk: ^3.10.7

dependencies:
  cupertino_icons: ^1.0.8
  flutter:
    sdk: flutter
  font_awesome_flutter: ^10.12.0
  url_launcher: ^6.3.2
  youtube_player_flutter: ^9.1.3

dev_dependencies:
  flutter_launcher_icons: ^0.10.0 # تمت إضافة هذه الحزمة لتوليد أيقونات التطبيق
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:

  uses-material-design: true

  assets:
    - assets/transcripts/
    - assets/transcripts_list.json

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png" # ضع هنا مسار أيقونتك الجديدة
