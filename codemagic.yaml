workflows:
  ios-release:
    name: Sunaa App iOS Release
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      groups:
        - app_store_credentials 
    scripts:
      - name: Set up code signing
        script: | 
          keychain initialize
          echo "$APP_STORE_CONNECT_KEY" > /tmp/apple_key.p8
          app-store-connect fetch-signing-files "com.example.sunaaApp" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_ID" \
            --p8-key /tmp/apple_key.p8 \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles --set-target-bundle-id
          rm /tmp/apple_key.p8
      - name: Clean and Install Pods
        script: |
          cd ios
          rm -rf Pods
          rm -rf Podfile.lock
          pod install --repo-update
          cd ..
      - name: Get Flutter packages
        script: flutter pub get
      - name: Build iOS IPA
        script: | 
          # إجبار النظام على وضع الـ Release وتجاوز خطأ الـ Build Configurations
          flutter build ipa --release \
            --export-method app-store \
            --build-number=21 \
            --dart-define=FLUTTER_BUILD_MODE=release
    artifacts:
      - build/ios/ipa/*.ipa