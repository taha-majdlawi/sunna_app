workflows:
  ios-release:
    name: Sunaa App iOS Release
    instance_type: mac_mini_m2
    max_build_duration: 60

    environment:
      flutter: stable
      xcode: latest
      groups:
        - app_store_credentials

    scripts:
      - name: Set up code signing
        script: |
          keychain initialize
          
          # جلب ملفات التوقيع (تأكد أن com.example.sunaaApp هو المعرف الصحيح)
          app-store-connect fetch-signing-files "com.example.sunaaApp" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_ID" \
            --p8-key "$APP_STORE_CONNECT_KEY" \
            --type IOS_APP_STORE \
            --create

          keychain add-certificates
          xcode-project use-profiles

      - name: Get Flutter packages
        script: flutter pub get

      - name: Build iOS IPA
        script: |
          # بناء ملف IPA مباشرة باستخدام Flutter (هذا الأمر يغنينا عن xcodebuild اليدوي)
          # تأكد من تمرير الـ export-options إذا كان التوقيع لا يزال يواجه مشاكل
          flutter build ios --release --export-bundle-id="com.example.sunaaApp"

    artifacts:
      - build/ios/ipa/*.ipa
      - /Users/builder/clone/build/ios/iphoneos/*.app