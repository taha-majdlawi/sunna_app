workflows:
  ios-release:
    name: Sunaa App iOS Release
    instance_type: mac_mini_m2
    max_build_duration: 60

    environment:
      flutter: stable
      xcode: latest
      groups:
        - app_store_credentials

    scripts:
      - name: Set up code signing
        script: |
          keychain initialize
          echo "$APP_STORE_CONNECT_KEY" > /tmp/apple_key.p8

          # جلب أو إنشاء شهادة توزيع جديدة مع مفتاحها الخاص (هذا هو الحل)
          app-store-connect certificates create --type IOS_DISTRIBUTION --auth-key-path /tmp/apple_key.p8 --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" --key-id "$APP_STORE_CONNECT_KEY_ID" --save || true

          # جلب ملفات التوقيع وربطها بالشهادة الجديدة
          app-store-connect fetch-signing-files "com.example.sunaaApp" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_ID" \
            --auth-key-path /tmp/apple_key.p8 \
            --type IOS_APP_STORE \
            --create

          keychain add-certificates
          xcode-project use-profiles

      - name: Get Flutter packages
        script: flutter pub get

      - name: Build iOS IPA
        script: |
          # بناء ملفات فلوتر
          flutter build ios --release --no-codesign

          # إجبار جميع الـ Pods والأهداف على استخدام فريق التطوير الخاص بك لتجنب خطأ (OrderedSet)
          xcode-project set-development-team --project ios/Runner.xcodeproj "$APPLE_TEAM_ID"

          # بناء الـ IPA باستخدام أداة Codemagic التي ستتولى إدارة الـ Manual Signing تلقائياً
          xcode-project build-ipa \
            --workspace ios/Runner.xcworkspace \
            --scheme Runner
            
    artifacts:
      - build/ios/ipa/*.ipa