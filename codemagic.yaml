workflows:
  ios-release:
    name: Sunaa App iOS Release
    instance_type: mac_mini_m2
    max_build_duration: 60

    environment:
      flutter: stable
      xcode: latest
      groups:
        - app_store_credentials

    scripts:
      - name: Set up code signing
        script: |
          keychain initialize
          
          echo "$APP_STORE_CONNECT_KEY" > /tmp/apple_key.p8
          
          # جلب ملفات التوقيع
          app-store-connect fetch-signing-files "com.example.sunaaApp" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_ID" \
            --auth-key-path /tmp/apple_key.p8 \
            --type IOS_APP_STORE \
            --create

          keychain add-certificates
          
          # 1. إجبار المشروع على التوقيع التلقائي (Automatic Signing)
          sed -i '' 's/ProvisioningStyle = Manual;/ProvisioningStyle = Automatic;/g' ios/Runner.xcodeproj/project.pbxproj
          
          # 2. إنشاء ملف ExportOptions.plist برمجياً لأنه مفقود في مشروعك
          cat <<EOF > /tmp/ExportOptions.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID</key>
              <string>$APPLE_TEAM_ID</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>manageAppVersionAndBuildNumber</key>
              <true/>
          </dict>
          </plist>
          EOF

          xcode-project use-profiles

      - name: Get Flutter packages
        script: flutter pub get

      - name: Build iOS IPA
        script: |
          # بناء ملفات فلوتر
          flutter build ios --release --no-codesign

          # استخدام أداة Codemagic للبناء مع تمرير ملف الإعدادات الذي أنشأناه للتو
          xcode-project build-ipa \
            --workspace ios/Runner.xcworkspace \
            --scheme Runner \
            --export-options-plist /tmp/ExportOptions.plist
            
    artifacts:
      - build/ios/ipa/*.ipa