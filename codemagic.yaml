workflows:
  ios-release:
    name: Sunaa App iOS Release
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      groups:
        - app_store_credentials 
    scripts:
      - name: Set up code signing
        script: | 
          keychain initialize
          echo "$APP_STORE_CONNECT_KEY" > /tmp/apple_key.p8
          app-store-connect fetch-signing-files "com.example.sunaaApp" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_ID" \
            --p8-key /tmp/apple_key.p8 \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles
          rm /tmp/apple_key.p8
      - name: Get Flutter packages
        script: flutter pub get
      - name: Build iOS IPA
        script: | 
          # 1. بناء الـ Archive لـ iOS حصراً
          flutter build ipa --release --no-codesign
          
          # 2. البحث عن الـ workspace الصحيح داخل مجلد ios فقط لضمان عدم الخلط مع macos
          WORKSPACE=$(find ios -name "*.xcworkspace" | head -1)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          
          # 3. التصدير النهائي باستخدام أداة Codemagic مع تحديد المسار
          xcode-project build-ipa \
            --workspace "$WORKSPACE" \
            --scheme "$SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa