workflows:
  ios-release:
    name: Sunaa App iOS Release
    instance_type: mac_mini_m2
    max_build_duration: 60

    environment:
      flutter: stable
      xcode: latest
      groups:
        - app_store_credentials

    scripts:
      - name: Set up code signing
        script: |
          keychain initialize
          
          # حفظ المفتاح في ملف فعلي لتجنب مشاكل الـ CLI
          echo "$APP_STORE_CONNECT_KEY" > /tmp/apple_key.p8

          # جلب ملفات التوقيع باستخدام الأمر المتوافق
          app-store-connect fetch-signing-files "com.example.sunaaApp" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_ID" \
            --auth-key-path /tmp/apple_key.p8 \
            --type IOS_APP_STORE \
            --create

          keychain add-certificates
          xcode-project use-profiles

      - name: Get Flutter packages
        script: flutter pub get

      - name: Build iOS IPA
        script: |
          # بناء ملفات iOS الأساسية
          flutter build ios --release --no-codesign

          # البناء والارشفة باستخدام xcodebuild مباشرة مع تمرير الفريق
          # هذه الطريقة تتخطى أخطاء الأدوات وتتحدث مع Xcode مباشرة
          xcodebuild -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath build/ios/archive/Runner.xcarchive \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_STYLE=Manual \
            archive

          # تحويل الأرشيف إلى IPA
          xcode-project build-ipa \
            --workspace ios/Runner.xcworkspace \
            --scheme Runner
            
    artifacts:
      - build/ios/ipa/*.ipa