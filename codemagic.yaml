workflows:
  ios-release:
    name: Sunaa App iOS Release
    instance_type: mac_mini_m2
    max_build_duration: 60

    environment:
      flutter: stable
      xcode: latest
      groups:
        - app_store_credentials

    scripts:
      - name: Set up code signing
        script: |
          keychain initialize
          
          echo "$APP_STORE_CONNECT_KEY" > /tmp/apple_key.p8
          
          # جلب ملفات التوقيع (خطوة احتياطية)
          app-store-connect fetch-signing-files "com.example.sunaaApp" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_ID" \
            --auth-key-path /tmp/apple_key.p8 \
            --type IOS_APP_STORE \
            --create

          keychain add-certificates
          
          # إجبار ملف المشروع على وضع التوقيع التلقائي واستخدام الفريق الصحيح
          sed -i '' 's/ProvisioningStyle = Manual;/ProvisioningStyle = Automatic;/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' "s/DEVELOPMENT_TEAM = [^;]*;/DEVELOPMENT_TEAM = $APPLE_TEAM_ID;/g" ios/Runner.xcodeproj/project.pbxproj
          
          xcode-project use-profiles

      - name: Get Flutter packages
        script: flutter pub get

      - name: Build iOS IPA
        script: |
          # بناء ملف IPA باستخدام Flutter مباشرة مع السماح بتحديثات التوقيع
          # هذا السطر هو الأقوى لأنه يدمج خطوات Xcode كلها في أمر واحد مدعوم
          flutter build ipa --release \
            --export-options-plist=ios/Runner/ExportOptions.plist \
            --build-number=$BUILD_NUMBER \
            --no-codesign # سنوقع في الخطوة التالية لضمان الدقة

          # التنفيذ النهائي للأرشفة والتصدير عبر أداة Codemagic المستقرة
          xcode-project build-ipa \
            --workspace ios/Runner.xcworkspace \
            --scheme Runner
            
    artifacts:
      - build/ios/ipa/*.ipa