workflows:
  ios-release:
    name: Sunaa App iOS Release
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      groups:
        - app_store_credentials
      vars:
        BUNDLE_ID: "com.example.sunaaApp"

    scripts:
      - name: Set up keychain
        script: keychain initialize
      
      - name: Fetch signing files from Codemagic UI
        script: |
          # جلب الملفات التي تظهر في صورك (sunna app certificate & profile)
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_ID" \
            --p8-key "$APP_STORE_CONNECT_KEY" \
            --type IOS_APP_STORE \
            --create
          
          keychain add-certificates
          xcode-project use-profiles

      - name: Get Flutter packages
        script: flutter pub get

      - name: Build iOS IPA
        script: |
          # بناء ملفات فلوتر
          flutter build ios --release --no-codesign
          
          # الخطوة القاتلة للخطأ: 
          # نقوم بتعديل ملف المشروع لإجبار Xcode على رؤية البروفايل الذي أنشأته (sunna app profile)
          # وتغيير الفريق ليتطابق مع (TAHA MAJDLAWI) الظاهر في صورتك
          sed -i '' "s/DEVELOPMENT_TEAM = [^;]*;/DEVELOPMENT_TEAM = $APPLE_TEAM_ID;/g" ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/ProvisioningStyle = Automatic;/ProvisioningStyle = Manual;/g' ios/Runner.xcodeproj/project.pbxproj

          # استخدام أداة Codemagic التي ستربط الآن بين الشهادة والبروفايل اللذين أصبحا جاهزين
          xcode-project build-ipa \
            --workspace ios/Runner.xcworkspace \
            --scheme Runner
            
    artifacts:
      - build/ios/ipa/*.ipa