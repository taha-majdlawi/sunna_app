workflows:
  ios-release:
    name: Sunaa App iOS Release
    instance_type: mac_mini_m2
    max_build_duration: 60

    environment:
      flutter: stable
      xcode: latest
      groups:
        - app_store_credentials

    scripts:
      - name: Set up code signing
        script: |
          keychain initialize
          
          # جلب ملفات التوقيع
          app-store-connect fetch-signing-files "com.example.sunaaApp" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_ID" \
            --p8-key "$APP_STORE_CONNECT_KEY" \
            --type IOS_APP_STORE \
            --create

          keychain add-certificates
          
          # تحديث المشروع لاستخدام ملفات التعريف المجلوبة وفريق التطوير
          xcode-project use-profiles --set-target-bundle-id
          sed -i '' "s/DEVELOPMENT_TEAM = [^;]*;/DEVELOPMENT_TEAM = $APPLE_TEAM_ID;/g" ios/Runner.xcodeproj/project.pbxproj

      - name: Get Flutter packages
        script: flutter pub get

      - name: Build iOS IPA
        script: |
          # بناء ملفات iOS الأساسية
          flutter build ios --release --no-codesign

          # استخدام أمر build-ipa مع تحديد ملفات التعريف بشكل صريح
          xcode-project build-ipa \
            --workspace ios/Runner.xcworkspace \
            --scheme Runner \
            --provisioning-profile "com.example.sunaaApp"
            
    artifacts:
      - build/ios/ipa/*.ipa