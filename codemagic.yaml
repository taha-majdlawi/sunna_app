workflows:
  ios-release:
    name: Sunaa App iOS Release
    instance_type: mac_mini_m2
    max_build_duration: 60

    environment:
      flutter: stable
      xcode: latest
      groups:
        - app_store_credentials

    scripts:
      - name: Set up code signing
        script: |
          keychain initialize
          
          # جلب ملفات التوقيع
          echo "$APP_STORE_CONNECT_KEY" > /tmp/apple_key.p8
          app-store-connect fetch-signing-files "com.example.sunaaApp" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_ID" \
            --auth-key-path /tmp/apple_key.p8 \
            --type IOS_APP_STORE \
            --create

          keychain add-certificates
          
          # إعداد المشروع لاستخدام البروفايلات المجلوبة
          xcode-project use-profiles

      - name: Get Flutter packages
        script: flutter pub get

      - name: Build iOS IPA
        script: |
          # بناء ملفات فلوتر
          flutter build ios --release --no-codesign

          # السحر هنا: أمر يفرض على Xcode قبول البروفايل المتاح وتجاهل الإعدادات اليدوية المعطلة
          export PROVISIONING_PROFILE=$(codemagic-cli-tools get-provisioning-profile "com.example.sunaaApp")
          
          xcodebuild -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath build/ios/archive/Runner.xcarchive \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            PROVISIONING_PROFILE_SPECIFIER="$PROVISIONING_PROFILE" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            CODE_SIGN_STYLE=Manual \
            archive

          # تصدير الـ IPA النهائي
          xcode-project build-ipa \
            --workspace ios/Runner.xcworkspace \
            --scheme Runner
            
    artifacts:
      - build/ios/ipa/*.ipa