workflows:
  ios-release:
    name: Sunaa App iOS Release
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      groups:
        - app_store_credentials

    scripts:
      - name: Set up keychain
        script: keychain initialize
      
      - name: Fetch signing files
        script: |
          # بما أن الملفات موجودة في الـ UI، هذا الأمر سيقوم بربطها فوراً
          app-store-connect fetch-signing-files "com.example.sunaaApp" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_ID" \
            --p8-key "$APP_STORE_CONNECT_KEY" \
            --type IOS_APP_STORE \
            --create
          
          keychain add-certificates
          xcode-project use-profiles

      - name: Get Flutter packages
        script: flutter pub get

      - name: Build iOS IPA
        script: |
          # سنستخدم أمر فلوتر الأساسي للبناء، هو الأذكى في التعامل مع التوقيع
          # عندما يجد الشهادات في الـ Keychain
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist \
            --no-codesign # سنترك لـ xcode-project التوقيع النهائي

          # التحويل النهائي لملف IPA
          xcode-project build-ipa \
            --workspace ios/Runner.xcworkspace \
            --scheme Runner
            
    artifacts:
      - build/ios/ipa/*.ipa