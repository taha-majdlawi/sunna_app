workflows:
  ios-release:
    name: Sunaa App iOS Release
    instance_type: mac_mini_m2
    max_build_duration: 60

    environment:
      flutter: stable
      xcode: latest
      groups:
        - app_store_credentials

    scripts:
      - name: Set up code signing
        script: |
          keychain initialize
          
          # جلب ملفات التوقيع باستخدام الصيغة المتوافقة
          app-store-connect fetch-signing-files "com.example.sunaaApp" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_ID" \
            --p8-key "$APP_STORE_CONNECT_KEY" \
            --type IOS_APP_STORE \
            --create

          keychain add-certificates
          
          # استخدام البروفايلات التي تم جلبها
          xcode-project use-profiles

      - name: Get Flutter packages
        script: flutter pub get

      - name: Build iOS IPA
        script: |
          # بناء ملفات فلوتر
          flutter build ios --release --no-codesign

          # استخدام أداة Codemagic المدمجة للبناء والتوقيع دفعة واحدة (أكثر استقراراً)
          xcode-project build-ipa \
            --workspace ios/Runner.xcworkspace \
            --scheme Runner \
            --bundle-id "com.example.sunaaApp"
            
    artifacts:
      - build/ios/ipa/*.ipa