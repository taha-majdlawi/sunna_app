workflows:
  ios-release:
    name: Sunaa App iOS Release
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      groups:
        - app_store_credentials # تأكد أن الـ API Key موجود هنا

    scripts:
      - name: Set up keychain
        script: keychain initialize
      
      - name: Fetch signing files from Codemagic UI
        script: |
          # سيقوم بجلب الشهادة والبروفايل اللذين أعددتهما في لوحة التحكم يدوياً
          app-store-connect fetch-signing-files "com.example.sunaaApp" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_ID" \
            --p8-key "$APP_STORE_CONNECT_KEY" \
            --type IOS_APP_STORE \
            --create
          
          keychain add-certificates
          xcode-project use-profiles

      - name: Get Flutter packages
        script: flutter pub get

      - name: Build iOS IPA
        script: |
          # بناء ملف IPA النهائي
          flutter build ios --release --no-codesign
          
          xcode-project build-ipa \
            --workspace ios/Runner.xcworkspace \
            --scheme Runner
            
    artifacts:
      - build/ios/ipa/*.ipa